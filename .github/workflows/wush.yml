name: Mirror SilkNet Website

on:
  workflow_dispatch:          # اجرای دستی
  schedule:
    - cron: '0 0 * * 0'      # اختیاری: هر یکشنبه نیمه‌شب به‌روزرسانی شود

permissions:
  contents: write             # اجازهٔ push به مخزن

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install wget
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Mirror website with wget
        run: |
          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --wait=2 \
            --limit-rate=200k \
            --tries=3 \
            --domains=dotnet.github.io \
            --include-directories=/Silk.NET/docs/learn,/Silk.NET/docs/styles,/Silk.NET/docs/images,/Silk.NET/docs/scripts,/Silk.NET/docs/fonts \
            --directory-prefix=./mirrored_site \
            https://dotnet.github.io/Silk.NET/docs/index.html

      - name: Copy mirrored files to repository root
        run: |
          # انتقال فایل‌های دانلود شده به ریشهٔ مخزن (بدون حذف پوشهٔ .git)
          rsync -a ./mirrored_site/ ./
          rm -rf ./mirrored_site

      - name: Commit and push changes
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add .
          # در صورت عدم تغییر، کامیتی انجام نمی‌شود
          git diff --staged --quiet || git commit -m "Mirror LearnOpenTK website"
          git push
