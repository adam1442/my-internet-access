name: 📘 ساخت نسخه PDF و HTML کتاب شیدرها

on:
  workflow_dispatch:        # ← با این دکمه می‌تونی دستی اجراش کنی
  # push:                   # ← (اختیاری) اگر خواستی با هر push هم اجرا بشه

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 دریافت کدهای کتاب
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: 🧰 نصب پیش‌نیازهای اصلی
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            pandoc python3 make wget gettext

      - name: 🎨 نصب glslViewer (برای تصاویر شیدرها)
        run: |
          GLSL_VERSION="3.1.1"
          wget -q https://github.com/patriciogonzalezvivo/glslViewer/releases/download/${GLSL_VERSION}/glslViewer-${GLSL_VERSION}-linux64 -O glslViewer
          chmod +x glslViewer
          sudo mv glslViewer /usr/local/bin/

      - name: ⚙️ نصب کتابخانه‌های Python مورد نیاز ساخت
        run: pip3 install --user markdown

      # ---------- ساخت PDF ----------
      - name: 📄 تولید فایل PDF کتاب
        run: make clean pdf

      # ---------- ساخت HTML (آینهٔ وبسایت) ----------
      - name: 🌐 آینه‌سازی کامل وبسایت کتاب
        run: |
          # یک پوشهٔ جداگانه برای خروجی HTML
          mkdir -p website_mirror
          cd website_mirror
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --wait=1 \
               --random-wait \
               https://thebookofshaders.com/
          # انتقال یک سطح بالا (اختیاری، فقط برای تمیزی)
          mv thebookofshaders.com/* .
          rm -rf thebookofshaders.com
          cd ..

      # ---------- ذخیره‌سازی تغییرات در مخزن ----------
      - name: 💾 کامیت و پوش کردن خروجی‌ها
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🎉 نسخه PDF و HTML کتاب ساخته شد (توسط اکشن)'
          file_pattern: 'book.pdf website_mirror/*'
          commit_user_name: 'GitHub Action'
          commit_user_email: 'action@github.com'
