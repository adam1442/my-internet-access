name: Mirror SilkNet Website (wget)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install wget
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Mirror website with wget
        run: |
          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --wait=2 \
            --limit-rate=200k \
            --tries=3 \
            --level=10 \
            --random-wait \
            --directory-prefix=./mirrored_site \
            https://dotnet.github.io/Silk.NET/docs/

      - name: Copy mirrored files to repository root
        run: |
          if [ -d "./mirrored_site/dotnet.github.io" ]; then
            rsync -a ./mirrored_site/dotnet.github.io/ ./
          else
            rsync -a ./mirrored_site/ ./
          fi
          rm -rf ./mirrored_site

      - name: Commit and push changes
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Mirror Silk.NET website (wget)"
          git push
