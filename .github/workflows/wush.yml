name: Direct Chisel Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install Chisel
        run: |
          curl -LO https://github.com/jpillora/chisel/releases/download/v1.9.1/chisel_1.9.1_linux_amd64.gz
          gzip -d chisel_1.9.1_linux_amd64.gz
          chmod +x chisel_1.9.1_linux_amd64
          mv chisel_1.9.1_linux_amd64 chisel

      - name: Get Runner Public IP
        id: ip
        run: |
          MY_IP=$(curl -s ifconfig.me)
          echo "Runner public IP: $MY_IP"
          echo "ip=$MY_IP" >> $GITHUB_ENV

      - name: Start Chisel Server & Print Fingerprint
        run: |
          echo "=============================================="
          echo "Runner IP: ${{ env.ip }}"
          echo "Use this IP with port 8080 in your client."
          echo "=============================================="
          ./chisel server --port 8080 --reverse 2>&1 | tee chisel.log &
          sleep 2
          # استخراج اثر انگشت از لاگ
          grep 'Fingerprint' chisel.log || (echo "Fingerprint line not found, showing first 10 lines:" && head -n 10 chisel.log)
          # زنده نگه‌داشتن رانر
          tail -f /dev/null
