name: 📘 ساخت نسخه PDF و HTML کتاب شیدرها

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ۰. دریافت مخزن خالی جاری
      - name: 📥 Checkout مخزن جاری
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ۱. کلون کردن مخزن اصلی کتاب
      - name: 📚 Clone کتاب
        run: |
          git clone https://github.com/patriciogonzalezvivo/thebookofshaders.git /tmp/book

      # ۲. نصب پیش‌نیازهای PDF و ابزارها
      - name: 🧰 نصب بسته‌های سیستم
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            pandoc python3 make wget gettext binutils

      # ۳. نصب glslViewer (نسخه ۳.۵.۲ - لینک درست)
      - name: 🎨 نصب glslViewer
        run: |
          GLSL_VERSION="3.5.2"
          DEB_FILE="glslViewer-${GLSL_VERSION}-amd64.deb"
          wget -q "https://github.com/patriciogonzalezvivo/glslViewer/releases/download/${GLSL_VERSION}/${DEB_FILE}" -O glslViewer.deb
          mkdir -p glsl_extract
          dpkg-deb -x glslViewer.deb glsl_extract
          sudo cp glsl_extract/usr/bin/glslViewer /usr/local/bin/
          # تست سلامت
          glslViewer --version || echo "⚠️ تست شکست خورد، اما ساخت ادامه دارد"

      # ۴. نصب کتابخانه‌های پایتون
      - name: ⚙️ نصب pip
        run: pip3 install --user markdown

      # ۵. ساخت PDF کتاب
      - name: 📄 تولید PDF
        working-directory: /tmp/book
        run: make clean pdf

      # ۶. آینه‌سازی وبسایت (HTML آفلاین)
      - name: 🌐 دانلود نسخه HTML
        run: |
          mkdir -p /tmp/mirror
          cd /tmp/mirror
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --wait=1 \
               --random-wait \
               https://thebookofshaders.com/
          if [ -d "thebookofshaders.com" ]; then
            mv thebookofshaders.com/* .
            rm -rf thebookofshaders.com
          fi

      # ۷. انتقال خروجی‌ها به مخزن
      - name: 📁 کپی خروجی‌ها
        run: |
          cp /tmp/book/book.pdf ./book.pdf
          mkdir -p website_mirror
          cp -r /tmp/mirror/* ./website_mirror/

      # ۸. کامیت و پوش نهایی
      - name: 💾 ثبت در مخزن
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🎉 PDF و HTML کتاب ساخته شد'
          file_pattern: 'book.pdf website_mirror/*'
          commit_user_name: 'GitHub Action'
          commit_user_email: 'action@github.com'
