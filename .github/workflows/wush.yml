name: Internet Tunnel via Chisel

on:
  workflow_dispatch:

jobs:
  chisel-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Chisel server
        run: |
          # دانلود Chisel
          curl -LO https://github.com/jpillora/chisel/releases/download/v1.9.1/chisel_1.9.1_linux_amd64.gz
          gzip -d chisel_1.9.1_linux_amd64.gz
          chmod +x chisel_1.9.1_linux_amd64
          # اجرای سرور Chisel روی پورت 8080
          ./chisel_1.9.1_linux_amd64 server --port 8080 --reverse
