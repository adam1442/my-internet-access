name: Wush Tunnel

on:
  workflow_dispatch:

jobs:
  connect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Wush
        run: |
          curl -fsSL https://github.com/coder/wush/releases/download/v0.4.0/wush_0.4.0_linux_amd64.tar.gz | tar -xz
          chmod +x wush

      - name: Create Custom DERP Config
        run: |
          cat <<EOF > derpmap.json
          {
            "OmitDefaultRegions": true
          }
          EOF

      - name: Start Wush Server
        run: |
          export WUSH_DERP_MAP_PATH=derpmap.json
          ./wush serve
