name: Mirror SilkNet Website (Playwright)

on:
  workflow_dispatch:          # اجرای دستی
  schedule:
    - cron: '0 0 * * 0'      # اختیاری: هر یکشنبه نیمه‌شب به‌روزرسانی شود

permissions:
  contents: write             # اجازهٔ push به مخزن

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright website-scraper website-scraper-puppeteer
          npx playwright install --with-deps chromium

      - name: Scrape website with Playwright
        run: |
          npx website-scraper \
            https://dotnet.github.io/Silk.NET/docs/ \
            --output-directory ./mirrored_site \
            --plugins website-scraper-puppeteer \
            --recursive true \
            --max-depth 20 \
            --max-recursive-depth 20 \
            --url-filter "dotnet.github.io" \
            --prettify-urls true \
            --sources [
              {"selector": "link[rel='stylesheet']", "attr": "href"},
              {"selector": "script", "attr": "src"},
              {"selector": "img", "attr": "src"}
            ]

      - name: Copy mirrored files to repository root
        run: |
          if [ -d "./mirrored_site/dotnet.github.io" ]; then
            rsync -a ./mirrored_site/dotnet.github.io/ ./
          else
            rsync -a ./mirrored_site/ ./
          fi
          rm -rf ./mirrored_site

      - name: Commit and push changes
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Mirror Silk.NET website (Playwright)"
          git push
