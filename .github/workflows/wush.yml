name: 📘 ساخت نسخه PDF و HTML کتاب شیدرها (از مخزن خالی)

on:
  workflow_dispatch:          # با دکمه Run workflow دستی اجرا می‌شود

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ۱. دریافت مخزن خالی فعلی (برای کامیت نهایی)
      - name: 📥 Checkout مخزن جاری (خالی)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ۲. Clone مخزن اصلی کتاب در یک پوشهٔ موقت
      - name: 📚 Clone کتاب از گیت‌هاب
        run: |
          git clone https://github.com/patriciogonzalezvivo/thebookofshaders.git /tmp/book

      # ۳. نصب پیش‌نیازهای PDF و wget
      - name: 🧰 نصب بسته‌های مورد نیاز
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            pandoc python3 make wget gettext binutils

      # ۴. نصب glslViewer با استفاده از بسته .deb
      - name: 🎨 نصب glslViewer (برای تصاویر شیدرها)
        run: |
          GLSL_VERSION="3.1.1"
          wget -q "https://github.com/patriciogonzalezvivo/glslViewer/releases/download/3.5.2/glslViewer-3.5.2-amd64.deb" -O glslViewer.deb
          mkdir -p glsl_extract
          dpkg-deb -x glslViewer.deb glsl_extract
          sudo cp glsl_extract/usr/bin/glslViewer /usr/local/bin/
          # تست اجرا
          glslViewer --version

      # ۵. نصب کتابخانه‌های پایتون
      - name: ⚙️ نصب pip مورد نیاز
        run: pip3 install --user markdown

      # ۶. ساخت فایل PDF از کتاب کلون شده
      - name: 📄 تولید PDF کتاب
        working-directory: /tmp/book
        run: make clean pdf

      # ۷. آینه‌سازی کامل وبسایت
      - name: 🌐 دانلود نسخه HTML آفلاین
        run: |
          mkdir -p /tmp/mirror
          cd /tmp/mirror
          wget --mirror \
               --convert-links \
               --adjust-extension \
               --page-requisites \
               --no-parent \
               --wait=1 \
               --random-wait \
               https://thebookofshaders.com/
          # انتقال فایلها به پوشه ساده‌تر
          if [ -d "thebookofshaders.com" ]; then
            mv thebookofshaders.com/* .
            rm -rf thebookofshaders.com
          fi

      # ۸. کپی خروجی‌ها به مخزن جاری
      - name: 📁 انتقال خروجی‌ها به ریشه مخزن
        run: |
          cp /tmp/book/book.pdf ./book.pdf
          mkdir -p website_mirror
          cp -r /tmp/mirror/* ./website_mirror/

      # ۹. کامیت و پوش فایل‌ها
      - name: 💾 ثبت خروجی‌ها در مخزن
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🎉 PDF و HTML کتاب ساخته شد (توسط اکشن)'
          file_pattern: 'book.pdf website_mirror/*'
          commit_user_name: 'GitHub Action'
          commit_user_email: 'action@github.com'
